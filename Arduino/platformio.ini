; PlatformIO Project Configuration File
; Sound-reactive NeoPixel Ring for Arduino UNO R4 WiFi
; LAFVIN UNO R4 Starter Kit

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200

; 上传端口不要写死 COM3。插上板子后：
;   pio device list
; 或双击运行 upload.bat，按提示输入实际 COM 号

; Adafruit NeoPixel library - best compatibility with UNO R4
lib_deps = 
    adafruit/Adafruit NeoPixel@^1.15.5

; Enable all warnings for better code quality
build_flags = -Wall -Wextra
